# ---------------------------------------------------------------------------
# KIND Single-Node Cluster Configuration
#
# This configuration creates a single-node Kubernetes cluster suitable
# for local development and CI/CD validation.
#
# Components:
#   - 1 control-plane node (also runs workloads)
#   - Ingress-ready port mappings (80, 443)
#   - Containerd config for registry mirror support
# ---------------------------------------------------------------------------

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: devops-cluster

# Use a recent Kubernetes version
# Check available node images at: https://hub.docker.com/r/kindest/node/tags
nodes:
  - role: control-plane
    image: kindest/node:v1.30.0
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Map host port 80 to container port 80 (HTTP ingress)
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # Map host port 443 to container port 443 (HTTPS ingress)
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Map host port 3000 to container port 3000 (Grafana)
      - containerPort: 30000
        hostPort: 3000
        protocol: TCP
      # Map host port 9090 to container port 9090 (Prometheus)
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP

# Optional: configure containerd registry mirrors for faster pulls
containerdConfigPatches:
  - |
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."docker.io"]
      endpoint = ["https://mirror.gcr.io"]
