apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  infrastructure.json: |
    {"dashboard":{"id":null,"uid":"infrastructure","title":"Infrastructure - DevOps Portfolio","tags":["infrastructure","kubernetes","devops"],"timezone":"utc","schemaVersion":36,"refresh":"10s","panels":[{"id":1,"title":"CPU Usage (%)","type":"timeseries","targets":[{"expr":"rate(container_cpu_usage_seconds_total{namespace=\"devops-app\"}[5m]) * 100","legendFormat":"{{ pod }}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100,"custom":{"lineWidth":2,"fillOpacity":10,"gradientMode":"opacity"}}},"gridPos":{"h":8,"w":12,"x":0,"y":0}},{"id":2,"title":"Memory Usage (MiB)","type":"timeseries","targets":[{"expr":"container_memory_working_set_bytes{namespace=\"devops-app\"} / 1024 / 1024","legendFormat":"{{ pod }}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"decmbytes","min":0,"custom":{"lineWidth":2,"fillOpacity":10}},"gridPos":{"h":8,"w":12,"x":12,"y":0}},{"id":3,"title":"Pod Status","type":"stat","targets":[{"expr":"kube_pod_status_ready{namespace=\"devops-app\",condition=\"true\"}","legendFormat":"{{ pod }}","refId":"A"}],"fieldConfig":{"defaults":{"mappings":[{"options":{"0":{"text":"Not Ready"}},"type":"value"},{"options":{"1":{"text":"Ready"}},"type":"value"}],"thresholds":{"steps":[{"color":"red","value":null},{"color":"green","value":1}]}}},"gridPos":{"h":8,"w":8,"x":0,"y":8}},{"id":4,"title":"Pod Restarts","type":"timeseries","targets":[{"expr":"kube_pod_container_status_restarts_total{namespace=\"devops-app\"}","legendFormat":"{{ pod }} - {{ container }}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"short","min":0,"custom":{"lineWidth":2,"fillOpacity":10}},"gridPos":{"h":8,"w":8,"x":8,"y":8}},{"id":5,"title":"Cluster Health - Node Status","type":"stat","targets":[{"expr":"kube_node_status_condition{condition=\"Ready\",status=\"true\"}","legendFormat":"{{ node }}","refId":"A"}],"fieldConfig":{"defaults":{"mappings":[{"options":{"0":{"text":"Not Ready"}},"type":"value"},{"options":{"1":{"text":"Ready"}},"type":"value"}],"thresholds":{"steps":[{"color":"red","value":null},{"color":"green","value":1}]}}},"gridPos":{"h":8,"w":8,"x":16,"y":8}}]}}
  application.json: |
    {"dashboard":{"id":null,"uid":"application","title":"Application - DevOps Portfolio","tags":["application","flask","devops"],"timezone":"utc","schemaVersion":36,"refresh":"10s","panels":[{"id":1,"title":"Request Rate (req/s)","type":"timeseries","targets":[{"expr":"sum(rate(http_requests_total{namespace=\"devops-app\"}[5m])) by (method, endpoint)","legendFormat":"{{ method }} {{ endpoint }}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"reqps","min":0,"custom":{"lineWidth":2,"fillOpacity":10,"gradientMode":"opacity"}},"gridPos":{"h":8,"w":12,"x":0,"y":0}},{"id":2,"title":"Error Rate (%)","type":"timeseries","targets":[{"expr":"sum(rate(http_errors_total{namespace=\"devops-app\"}[5m])) / sum(rate(http_requests_total{namespace=\"devops-app\"}[5m])) * 100","legendFormat":"Error Rate","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"custom":{"lineWidth":2,"fillOpacity":10,"gradientMode":"opacity"}},"gridPos":{"h":8,"w":12,"x":12,"y":0}},{"id":3,"title":"Response Time (p50, p95, p99)","type":"timeseries","targets":[{"expr":"histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=\"devops-app\"}[5m])) by (le, endpoint))","legendFormat":"p50 {{ endpoint }}","refId":"A"},{"expr":"histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"devops-app\"}[5m])) by (le, endpoint))","legendFormat":"p95 {{ endpoint }}","refId":"B"},{"expr":"histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=\"devops-app\"}[5m])) by (le, endpoint))","legendFormat":"p99 {{ endpoint }}","refId":"C"}],"fieldConfig":{"defaults":{"unit":"s","min":0,"custom":{"lineWidth":2,"fillOpacity":0}},"gridPos":{"h":8,"w":24,"x":0,"y":8}}]}}
