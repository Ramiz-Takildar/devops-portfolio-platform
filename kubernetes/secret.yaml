apiVersion: v1
kind: Secret
metadata:
  name: devops-app-secret
  namespace: devops-app
  labels:
    app.kubernetes.io/name: devops-portfolio-app
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # Base64-encoded placeholder values
  # Real values should be injected via CI/CD or Sealed Secrets
  API_KEY: "demo-api-key-change-in-production"
  DATABASE_URL: "postgresql://demo:demo@localhost:5432/demo"
