apiVersion: v1
kind: Service
metadata:
  name: devops-app
  namespace: devops-app
  labels:
    app.kubernetes.io/name: devops-portfolio-app
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: devops-platform
  annotations:
    description: "ClusterIP service for the DevOps Portfolio application"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: devops-portfolio-app
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
